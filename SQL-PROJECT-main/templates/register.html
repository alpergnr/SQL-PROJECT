<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol — Njoy Emlak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="admin-login-page">
        <section class="admin-login-card">
            <a href="/" class="nav-brand admin-login-brand">
                <span class="brand-icon">◆</span>
                <span class="brand-text">NJOY<span class="brand-accent">EMLAK</span></span>
            </a>
            <h1>Kayıt Ol</h1>
            <p>İlanları kaydedin, danışmana soru sorun ve mesajlarınızı takip edin.</p>
            {% if error %}
            <div class="admin-error">{{ error }}</div>
            {% endif %}
            <form method="post" class="admin-form">
                <label class="form-group">
                    <span class="form-label">Ad Soyad</span>
                    <input class="form-input" name="name" required>
                </label>
                <label class="form-group">
                    <span class="form-label">E-posta</span>
                    <input class="form-input" type="email" name="email" required>
                </label>
                <label class="form-group">
                    <span class="form-label">Şifre</span>
                    <input class="form-input" type="password" name="password" required>
                </label>
                <button class="btn-primary" type="submit">Hesap Oluştur</button>
            </form>
            <p class="admin-login-hint">Zaten hesabınız varsa <a href="/login">giriş yapın</a>.</p>
        </section>
    </main>
</body>
</html>
